name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auto_shorts_saas_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx knex migrate:latest --knexfile knexfile.js
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/auto_shorts_saas_test
          NODE_ENV: test

      - run: npx knex seed:run --knexfile knexfile.js
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/auto_shorts_saas_test
          NODE_ENV: test

      - run: npm test
        env:
          DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/auto_shorts_saas_test
          NODE_ENV: test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/frontend/package-lock.json

      - run: npm ci

      - run: npm test -- --watchAll=false

      - run: npm run build
